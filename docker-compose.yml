services:
  cassandra-1:
    image: cassandra:4.1
    container_name: geoloc-cassandra-1
    environment:
      CASSANDRA_CLUSTER_NAME: geoloc
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data_1:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped
    profiles:
      - dev
      - app

  cassandra-2:
    image: cassandra:4.1
    container_name: geoloc-cassandra-2
    environment:
      CASSANDRA_CLUSTER_NAME: geoloc
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    depends_on:
      cassandra-1:
        condition: service_healthy
    volumes:
      - cassandra_data_2:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh cassandra-1 -e 'DESCRIBE CLUSTER'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped
    profiles:
      - dev
      - app

  cassandra-3:
    image: cassandra:4.1
    container_name: geoloc-cassandra-3
    environment:
      CASSANDRA_CLUSTER_NAME: geoloc
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    depends_on:
      cassandra-1:
        condition: service_healthy
    volumes:
      - cassandra_data_3:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh cassandra-1 -e 'DESCRIBE CLUSTER'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped
    profiles:
      - dev
      - app

  cassandra-db-init:
    image: cassandra:4.1
    container_name: geoloc-cassandra-init
    depends_on:
      cassandra-1:
        condition: service_healthy
      cassandra-2:
        condition: service_healthy
      cassandra-3:
        condition: service_healthy
    volumes:
      - ./migrations/cassandra_schema.cql:/schema/cassandra_schema.cql:ro
      - ./migrations/mock_data.cql:/schema/mock_data.cql:ro
    entrypoint:
      - /bin/sh
      - -ec
      - |
        echo "Waiting for Cassandra coordinator..."
        until cqlsh cassandra-1 -e "DESCRIBE CLUSTER"; do sleep 5; done
        echo "Applying Cassandra schema..."
        cqlsh cassandra-1 -f /schema/cassandra_schema.cql
        echo "Applying optional mock data (idempotent)..."
        cqlsh cassandra-1 -f /schema/mock_data.cql || true
        echo "Cassandra initialization complete."
    profiles:
      - dev
      - app

  redis:
    image: redis:7-alpine
    container_name: geoloc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    profiles:
      - dev
      - app

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geoloc-api
    env_file:
      - .env
    environment:
      APP_ENV: development
      CASSANDRA_HOST: cassandra-1
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: geoloc
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 8080
      BASE_URL: http://localhost:8080
      UPLOAD_PATH: /app/uploads
    ports:
      - "8080:8080"
    depends_on:
      cassandra-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://127.0.0.1:8080/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    profiles:
      - app

  caddy:
    image: caddy:2-alpine
    container_name: geoloc-caddy
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    profiles:
      - with-proxy

volumes:
  cassandra_data_1:
  cassandra_data_2:
  cassandra_data_3:
  redis_data:
  caddy_data:
  caddy_config:
