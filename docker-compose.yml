services:
  cassandra-1:
    image: cassandra:5.0
    container_name: geoloc-cassandra-1
    environment:
      CASSANDRA_CLUSTER_NAME: geoloc
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data_1:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped
    profiles:
      - dev
      - app

  cassandra-2:
    image: cassandra:5.0
    container_name: geoloc-cassandra-2
    environment:
      CASSANDRA_CLUSTER_NAME: geoloc
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    depends_on:
      cassandra-1:
        condition: service_healthy
    volumes:
      - cassandra_data_2:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh cassandra-1 -e 'DESCRIBE CLUSTER'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped
    profiles:
      - dev
      - app

  cassandra-3:
    image: cassandra:5.0
    container_name: geoloc-cassandra-3
    environment:
      CASSANDRA_CLUSTER_NAME: geoloc
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    depends_on:
      cassandra-1:
        condition: service_healthy
    volumes:
      - cassandra_data_3:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh cassandra-1 -e 'DESCRIBE CLUSTER'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped
    profiles:
      - dev
      - app

  cassandra-db-init:
    image: cassandra:5.0
    container_name: geoloc-cassandra-init
    depends_on:
      cassandra-1:
        condition: service_healthy
      cassandra-2:
        condition: service_healthy
      cassandra-3:
        condition: service_healthy
    volumes:
      - ./migrations/cassandra_schema.cql:/schema/cassandra_schema.cql:ro
      - ./migrations/003_mvp_features.cql:/schema/003_mvp_features.cql:ro
      - ./migrations/004_like_comment_v3.cql:/schema/004_like_comment_v3.cql:ro
      - ./migrations/005_search_indexes.cql:/schema/005_search_indexes.cql:ro
      - ./migrations/006_notifications_v2.cql:/schema/006_notifications_v2.cql:ro
      - ./migrations/007_dm.cql:/schema/007_dm.cql:ro
      - ./migrations/008_dm_multidevice.cql:/schema/008_dm_multidevice.cql:ro
      - ./migrations/mock_data.cql:/schema/mock_data.cql:ro
    entrypoint:
      - /bin/sh
      - -ec
      - |
        echo "Waiting for Cassandra coordinator..."
        until cqlsh cassandra-1 -e "DESCRIBE CLUSTER"; do sleep 5; done
        echo "Applying Cassandra schema..."
        cqlsh cassandra-1 -f /schema/cassandra_schema.cql
        echo "Applying migration: 003_mvp_features..."
        cqlsh cassandra-1 -f /schema/003_mvp_features.cql || true
        echo "Applying migration: 004_like_comment_v3..."
        cqlsh cassandra-1 -f /schema/004_like_comment_v3.cql || true
        echo "Applying migration: 005_search_indexes..."
        cqlsh cassandra-1 -f /schema/005_search_indexes.cql || true
        echo "Applying migration: 006_notifications_v2..."
        cqlsh cassandra-1 -f /schema/006_notifications_v2.cql || true
        echo "Applying migration: 007_dm..."
        cqlsh cassandra-1 -f /schema/007_dm.cql || true
        echo "Applying migration: 008_dm_multidevice..."
        cqlsh cassandra-1 -f /schema/008_dm_multidevice.cql || true
        echo "Applying optional mock data (idempotent)..."
        cqlsh cassandra-1 -f /schema/mock_data.cql || true
        echo "Cassandra initialization complete."
    profiles:
      - dev
      - app

  # ============== KAFKA (KRaft mode — no ZooKeeper) ==============
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: geoloc-kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: "GeOlOcKaFkAcLuStErId01"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    profiles:
      - dev
      - app

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: geoloc-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: geoloc-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - dev

  redis:
    image: redis:7-alpine
    container_name: geoloc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    profiles:
      - dev
      - app

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geoloc-api
    env_file:
      - .env
    environment:
      APP_ENV: development
      CASSANDRA_HOST: cassandra-1
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: geoloc
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 8080
      BASE_URL: http://localhost:8080
      UPLOAD_PATH: /app/uploads
      KAFKA_BROKERS: kafka:29092
      KAFKA_NOTIFICATIONS_ENABLED: "true"
      KAFKA_CONSUMER_GROUP_PREFIX: geoloc
      PUSH_NOTIFICATIONS_ENABLED: "false"
      FCM_PROJECT_ID: ""
      FCM_CREDENTIALS_JSON: ""
    ports:
      - "8080:8080"
    depends_on:
      cassandra-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://127.0.0.1:8080/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    profiles:
      - app

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: geoloc_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/var/lib/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    profiles:
      - dev
      - app

  search-indexer:
    build:
      context: .
      dockerfile: cmd/indexer/Dockerfile
    container_name: geoloc_search_indexer
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      APP_ENV: development
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX_POSTS: posts
      ELASTICSEARCH_INDEX_USERS: users
      KAFKA_BROKERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    restart: unless-stopped
    profiles:
      - app

  caddy:
    image: caddy:2-alpine
    container_name: geoloc-caddy
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    profiles:
      - with-proxy

volumes:
  cassandra_data_1:
  cassandra_data_2:
  cassandra_data_3:
  redis_data:
  caddy_data:
  caddy_config:
  kafka_data:
  esdata:
    driver: local
